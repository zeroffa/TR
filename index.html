<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台鐵時刻表直覺轉換器 (完整格式版)</title>
    <style>
        :root { --tra-blue: #003366; --tra-red: #d32f2f; --tra-bg: #f8f9fa; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--tra-bg); padding: 20px; }
        .container { max-width: 100%; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: var(--tra-blue); text-align: center; margin-bottom: 25px; border-bottom: 3px solid var(--tra-blue); padding-bottom: 10px; }
        
        /* 操作面板 */
        .config-box { background: #eef2f7; padding: 25px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #d1d9e6; }
        .row { display: flex; gap: 15px; align-items: center; margin-bottom: 15px; flex-wrap: wrap; }
        strong { color: var(--tra-blue); min-width: 120px; }
        input[type="text"], input[type="file"] { padding: 12px; border: 1px solid #ccc; border-radius: 8px; flex: 1; min-width: 300px; font-size: 16px; }
        button { padding: 12px 35px; background: var(--tra-blue); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #004080; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        /* 表格樣式 */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; min-width: 1200px; }
        th { background: var(--tra-blue); color: white; padding: 12px 5px; border: 1px solid #ddd; white-space: nowrap; }
        td { padding: 10px 5px; border: 1px solid #ddd; text-align: center; }
        tr:nth-child(even) { background: #fdfdfd; }
        tr:hover { background: #fff9c4; }
        
        /* 內容樣式 */
        .time-dep { color: var(--tra-red); font-weight: bold; font-family: 'Consolas', 'Courier New', monospace; font-size: 1.15em; }
        .train-no { font-weight: bold; color: #333; }
        .stn-col { background: #f0f4f8; font-weight: bold; color: var(--tra-blue); }
        .note-cell { text-align: left; font-size: 12px; color: #666; max-width: 150px; }
        .status { font-size: 13px; color: #555; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚂 台鐵時刻表專業轉換器</h1>
        
        <div class="config-box">
            <div class="row">
                <strong>1. 載入 JSON 檔案</strong>
                <input type="file" id="jsonFile" accept=".json">
            </div>
            <div class="row">
                <strong>2. 車站中文名稱</strong>
                <input type="text" id="stnInput" value="高雄, 斗六, 二水, 田中, 彰化, 台中, 竹南, 桃園, 台北" placeholder="輸入中文站名，用逗號隔開">
                <button onclick="run()">執行轉換</button>
            </div>
            <div class="status" id="status">請先選擇台鐵 JSON 時刻表檔案...</div>
        </div>

        <div id="output" class="table-container"></div>
    </div>

    <script>
        // 站名與代碼完整對照表 (基於 Tip111)
        const STN_DATA = {
            "基隆":"0900","七堵":"0930","南港":"0980","松山":"0990","台北":"1000","板橋":"1020","樹林":"1030","桃園":"1040","中壢":"1060","新竹":"1080","竹南":"1250","苗栗":"1300","豐原":"3220","台中":"3300","彰化":"3360","員林":"3390","田中":"3430","二水":"3450","斗六":"3470","嘉義":"4080","新營":"4220","台南":"4400","岡山":"4600","新左營":"4610","高雄":"4400","屏東":"5000","潮州":"5050","宜蘭":"7000","羅東":"7100","花蓮":"6000","台東":"5100"
        };
        const CODE_TO_NAME = Object.fromEntries(Object.entries(STN_DATA).map(([k, v]) => [v, k]));

        const CAR_CLASS = { "110G":"自強(3000)","110H":"自強(3000)","1101":"太魯閣","1102":"普悠瑪","1131":"區間車","1132":"區間快","1110":"莒光號","1103":"自強號" };
        const LINE_DIR = { "0": "", "1": "山", "2": "海", "3": "成追" };

        let rawJson = null;

        document.getElementById('jsonFile').onchange = e => {
            const r = new FileReader();
            r.onload = ev => {
                rawJson = JSON.parse(ev.target.result);
                document.getElementById('status').innerText = "✅ 資料載入成功！請點擊「執行轉換」。";
                document.getElementById('status').style.color = "green";
            };
            r.readAsText(e.target.files[0]);
        };

        function run() {
            if (!rawJson) return alert("請先上傳 JSON 檔案！");
            
            const inputVal = document.getElementById('stnInput').value;
            const names = inputVal.split(',').map(s => s.trim().replace('車站','')).filter(s => s);
            const codes = names.map(n => STN_DATA[n] || n);

            const trains = rawJson.TrainInfos || [];
            
            // 過濾：只要有停靠目標站點中任何一個的車次都抓出來
            let filtered = trains.filter(t => t.TimeInfos.some(ti => codes.includes(ti.Station)));

            // 排序：以第一個輸入的車站之 DEPTime (發車時間) 排序
            filtered.sort((a, b) => {
                const ta = a.TimeInfos.find(s => s.Station === codes[0])?.DEPTime || "99:99";
                const tb = b.TimeInfos.find(s => s.Station === codes[0])?.DEPTime || "99:99";
                return ta.localeCompare(tb);
            });

            render(filtered, names, codes);
        }

        function render(data, names, codes) {
            let html = `<table><thead><tr>
                <th>車次</th><th>車別</th><th>經由</th><th>起站</th><th>終站</th>`;
            
            // 動態產生車站標頭
            names.forEach(n => html += `<th class="stn-header">${n}</th>`);
            html += `<th>備註</th></tr></thead><tbody>`;

            data.forEach(t => {
                const startCode = t.TimeInfos[0].Station;
                const endCode = t.TimeInfos[t.TimeInfos.length - 1].Station;
                
                html += `<tr>
                    <td class="train-no">${t.Train}</td>
                    <td>${CAR_CLASS[t.CarClass] || t.CarClass}</td>
                    <td>${LINE_DIR[t.Line] || ""}</td>
                    <td>${CODE_TO_NAME[startCode] || startCode}</td>
                    <td>${CODE_TO_NAME[endCode] || endCode}</td>`;

                // 填入各站時間
                codes.forEach(c => {
                    const stop = t.TimeInfos.find(si => si.Station === c);
                    // 關鍵：使用 DEPTime (發車時間)
                    html += `<td>${stop ? '<span class="time-dep">' + stop.DEPTime.substring(0,5) + '</span>' : ""}</td>`;
                });

                html += `<td class="note-cell">${t.Note || ""}</td></tr>`;
            });

            document.getElementById('output').innerHTML = html + "</tbody></table>";
        }
    </script>
</body>
</html>
