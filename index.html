<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台鐵自定義聯合時刻表</title>
    <style>
        :root { --tra-main: #003366; --tra-accent: #d32f2f; --bg: #f5f7fa; }
        body { font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .card { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.1); }
        h1 { color: var(--tra-main); text-align: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-top: 0; }
        
        /* 控制區 */
        .controls { background: #fdfdfd; border: 1px solid #e1e4e8; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .input-group { display: flex; gap: 15px; margin-bottom: 15px; align-items: center; flex-wrap: wrap; }
        input[type="text"], input[type="file"] { padding: 10px; border: 1px solid #ccc; border-radius: 5px; flex: 1; min-width: 200px; }
        button { padding: 10px 25px; background: var(--tra-main); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #004080; }
        
        /* 表格樣式 - 依據圖片優化 */
        .table-wrapper { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: var(--tra-main); color: white; padding: 12px 8px; border: 1px solid #fff; font-size: 15px; }
        td { padding: 12px 8px; border: 1px solid #e1e4e8; text-align: center; font-size: 14px; }
        .stn-header { background: #eef2f7; color: var(--tra-main); font-weight: bold; }
        
        /* 數值樣式 */
        .train-no { font-weight: bold; color: #333; }
        .time-dep { font-family: "Courier New", monospace; color: var(--tra-accent); font-weight: bold; font-size: 1.15em; }
        .empty-time { color: #ccc; font-size: 12px; }
        
        /* 標籤樣式 */
        .tag { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; color: white; font-weight: bold; margin: 1px; }
        .tag-breast { background: #ff4081; } .tag-wheel { background: #2196f3; }
        .tag-bike { background: #4caf50; } .tag-food { background: #ff9800; }
        
        .footer { text-align: center; color: #888; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>台鐵自定義聯合時刻表</h1>
        
        <div class="controls">
            <div class="input-group">
                <strong>1. 載入 JSON：</strong>
                <input type="file" id="jsonFile" accept=".json">
            </div>
            <div class="input-group">
                <strong>2. 設定站點：</strong>
                <input type="text" id="stnCodes" placeholder="輸入代碼 (例如: 1000,1020,1040,1080)">
                <button onclick="generate()">產生表格</button>
            </div>
            <div style="font-size: 12px; color: #666;">* 輸入多個代碼時請以英文逗號分隔，表格將依據第一個站點時間排序。</div>
        </div>

        <div id="view" class="table-wrapper"></div>
        <div class="footer">本工具支援離線使用，資料完全在瀏覽器端處理。</div>
    </div>

    <script>
        let db = null;
        const clsMap = { "110G":"自強(3000)","110H":"自強(3000)","1101":"太魯閣","1131":"區間","1132":"區間快","1103":"自強" };

        document.getElementById('jsonFile').onchange = e => {
            const r = new FileReader();
            r.onload = ev => { db = JSON.parse(ev.target.result); alert("資料讀取成功！"); };
            r.readAsText(e.target.files[0]);
        };

        function generate() {
            if (!db) return alert("請先選擇 JSON 檔案");
            const stns = document.getElementById('stnCodes').value.split(',').map(s => s.trim()).filter(s => s);
            if (stns.length === 0) return alert("請輸入至少一個車站代碼");

            const list = (db.TrainInfos || db[0]?.TrainInfos || []).filter(t => t.TimeInfos.some(s => stns.includes(s.Station)));
            
            // 排序：以第一個輸入的車站發車時間排序
            list.sort((a, b) => {
                const ta = a.TimeInfos.find(x => x.Station === stns[0])?.DEPTime || "99:99";
                const tb = b.TimeInfos.find(x => x.Station === stns[0])?.DEPTime || "99:99";
                return ta.localeCompare(tb);
            });

            render(list, stns);
        }

        function render(data, stns) {
            let h = `<table><thead><tr><th>車次</th><th>車種</th>`;
            stns.forEach(s => h += `<th class="stn-header">${s}<br>發車</th>`);
            h += `<th>服務項目</th><th>備註</th></tr></thead><tbody>`;

            data.forEach(t => {
                h += `<tr><td class="train-no">${t.Train}</td><td><small>${clsMap[t.CarClass] || t.CarClass}</small></td>`;
                stns.forEach(s => {
                    const stop = t.TimeInfos.find(si => si.Station === s);
                    h += stop ? `<td class="time-dep">${stop.DEPTime.substring(0,5)}</td>` : `<td class="empty-time">--:--</td>`;
                });
                let svc = (t.BreastFeed==='Y'?'<span class="tag tag-breast">哺</span>':'') +
                          (t.Cripple==='Y'?'<span class="tag tag-wheel">輪</span>':'') +
                          (t.Bike==='Y'?'<span class="tag tag-bike">腳</span>':'') +
                          (t.FoodSrv==='Y'?'<span class="tag tag-food">訂</span>':'');
                h += `<td>${svc}</td><td><small>${t.Note || ""}</small></td></tr>`;
            });
            document.getElementById('view').innerHTML = h + "</tbody></table>";
        }
    </script>
</body>
</html>
