<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台鐵時刻表自定義轉換器 (縱向版)</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f0f2f5; padding: 20px; margin: 0; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: #003366; text-align: center; }
        .config-box { background: #eef2f7; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #d1d9e6; }
        .row { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; flex-wrap: wrap; }
        input[type="text"], input[type="file"] { padding: 10px; border: 1px solid #ccc; border-radius: 5px; flex: 1; }
        button { padding: 10px 25px; background: #003366; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th { background: #003366; color: white; padding: 10px 5px; border: 1px solid #ddd; white-space: nowrap; }
        td { padding: 10px 5px; border: 1px solid #ddd; text-align: center; }
        tr:nth-child(even) { background: #f9f9f9; }
        .time { color: #d32f2f; font-weight: bold; font-family: monospace; }
        .stn-header { background: #d9e2ec; color: #003366; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>台鐵時刻表自定義轉換器</h1>
        
        <div class="config-box">
            <div class="row">
                <strong>1. 載入 JSON：</strong>
                <input type="file" id="jsonFile" accept=".json">
            </div>
            <div class="row">
                <strong>2. 設定站點代碼 (由左至右)：</strong>
                <input type="text" id="stnCodes" value="3300, 3360, 3390" placeholder="例如: 1210,1250,3300">
            </div>
            <div class="row">
                <strong>3. 設定站點名稱 (顯示用)：</strong>
                <input type="text" id="stnNames" value="田中, 彰化, 台中" placeholder="例如: 台北, 桃園, 台中">
                <button onclick="transform()">執行轉換</button>
            </div>
            <small style="color: #666;">* 提示：請依照你想要看到的車站順序輸入代碼與名稱，順序必須對應。</small>
        </div>

        <div id="output" style="overflow-x: auto;"></div>
    </div>

    <script>
        let db = null;
        const lineMap = { "0": "", "1": "山", "2": "海", "3": "成追" };
        
        document.getElementById('jsonFile').onchange = e => {
            const r = new FileReader();
            r.onload = ev => { db = JSON.parse(ev.target.result); alert("資料已載入"); };
            r.readAsText(e.target.files[0]);
        };

        function transform() {
            if (!db) return alert("請先載入 JSON");
            const codes = document.getElementById('stnCodes').value.split(',').map(s => s.trim());
            const names = document.getElementById('stnNames').value.split(',').map(s => s.trim());
            
            const trains = db.TrainInfos || [];
            
            let h = `<table><thead><tr>
                <th>車次</th><th>車別</th><th>經由</th><th>起站</th><th>終站</th>`;
            
            names.forEach(n => h += `<th class="stn-header">${n}</th>`);
            h += `<th>備註</th></tr></thead><tbody>`;

            // 依照第一站的時間排序
            trains.sort((a, b) => {
                const tA = a.TimeInfos.find(s => s.Station === codes[0])?.DEPTime || "99:99";
                const tB = b.TimeInfos.find(s => s.Station === codes[0])?.DEPTime || "99:99";
                return tA.localeCompare(tB);
            });

            trains.forEach(t => {
                // 檢查是否停靠這串站點中的任何一站
                const hasStop = t.TimeInfos.some(si => codes.includes(si.Station));
                if (!hasStop) return;

                const startStn = t.TimeInfos[0].Station;
                const endStn = t.TimeInfos[t.TimeInfos.length - 1].Station;

                h += `<tr>
                    <td><b>${t.Train}</b></td>
                    <td>${t.CarClass}</td>
                    <td>${lineMap[t.Line] || ""}</td>
                    <td>${startStn}</td>
                    <td>${endStn}</td>`;
                
                codes.forEach(c => {
                    const stop = t.TimeInfos.find(si => si.Station === c);
                    h += `<td class="time">${stop ? stop.DEPTime.substring(0,5) : ""}</td>`;
                });

                h += `<td style="text-align:left; font-size:11px;">${t.Note || ""}</td></tr>`;
            });

            document.getElementById('output').innerHTML = h + "</tbody></table>";
        }
    </script>
</body>
</html>
