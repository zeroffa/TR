<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台鐵時刻表自定義轉換器 - 中文直覺版</title>
    <style>
        :root { --tra-blue: #003366; --tra-red: #d32f2f; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f4f7f9; padding: 20px; }
        .container { max-width: 100%; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: var(--tra-blue); text-align: center; margin-bottom: 25px; }
        .config-box { background: #eef2f7; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #d1d9e6; }
        .row { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; flex-wrap: wrap; }
        input[type="text"], input[type="file"] { padding: 12px; border: 1px solid #ccc; border-radius: 8px; flex: 1; min-width: 300px; font-size: 16px; }
        button { padding: 12px 30px; background: var(--tra-blue); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background: #004080; }
        
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; min-width: 1000px; }
        th { background: var(--tra-blue); color: white; padding: 12px 8px; border: 1px solid #ddd; white-space: nowrap; }
        td { padding: 12px 8px; border: 1px solid #ddd; text-align: center; }
        tr:nth-child(even) { background: #f9f9f9; }
        tr:hover { background: #fff9c4; }
        .time { color: var(--tra-red); font-weight: bold; font-family: 'Courier New', monospace; font-size: 1.1em; }
        .stn-col { background: #f0f4f8; font-weight: bold; color: var(--tra-blue); min-width: 80px; }
        .train-info { font-weight: bold; color: #333; }
        .note { text-align: left; font-size: 12px; color: #666; max-width: 200px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚂 台鐵時刻表自定義轉換器</h1>
        
        <div class="config-box">
            <div class="row">
                <strong>1. 載入 JSON 檔案：</strong>
                <input type="file" id="jsonFile" accept=".json">
            </div>
            <div class="row">
                <strong>2. 輸入車站名稱 (請依順序，用逗號隔開)：</strong>
                <input type="text" id="stnInput" value="高雄, 斗六, 二水, 田中, 彰化, 台中, 台北" placeholder="例如: 高雄, 斗六, 田中, 彰化, 台北">
                <button onclick="runTransform()">轉換時刻表</button>
            </div>
            <div style="font-size: 13px; color: #555;">提示：直接輸入中文站名即可，程式會自動對照代碼。排序以左側第一站的發車時間為準。</div>
        </div>

        <div id="output" class="table-container"></div>
    </div>

    <script>
        // 根據台鐵官網整理的代碼表 (Tip111)
        const STATION_MAP = {
            "基隆":"0900","台北":"1000","板橋":"1020","桃園":"1040","中壢":"1060","新竹":"1080","竹南":"1250","苗栗":"1300","豐原":"3220","台中":"3300","彰化":"3360","員林":"3390","田中":"3430","二水":"3450","斗六":"3470","嘉義":"4080","新營":"4220","台南":"4400","岡山":"4600","新左營":"4610","高雄":"4400","屏東":"5000","宜蘭":"7000","羅東":"7100","花蓮":"6000","台東":"5100"
        };
        // 反向索引：代碼轉名稱
        const CODE_TO_NAME = Object.fromEntries(Object.entries(STATION_MAP).map(([k, v]) => [v, k]));

        const CAR_CLASS_MAP = { "110G":"自強(3000)","110H":"自強(3000)","1101":"太魯閣","1102":"普悠瑪","1131":"區間車","1132":"區間快","1110":"莒光號","1103":"自強號" };
        const LINE_MAP = { "0": "", "1": "山", "2": "海", "3": "成追" };

        let jsonData = null;

        document.getElementById('jsonFile').onchange = e => {
            const r = new FileReader();
            r.onload = ev => { jsonData = JSON.parse(ev.target.result); alert("✅ JSON 已讀取"); };
            r.readAsText(e.target.files[0]);
        };

        function runTransform() {
            if (!jsonData) return alert("請先上傳 JSON 檔案！");
            
            const rawInput = document.getElementById('stnInput').value;
            const inputNames = rawInput.split(',').map(s => s.trim().replace('車站','')).filter(s => s);
            const targetCodes = inputNames.map(name => STATION_MAP[name] || name);

            const trains = jsonData.TrainInfos || [];
            
            // 過濾：只要有停靠我們指定的任一站就留著
            let filtered = trains.filter(t => t.TimeInfos.some(ti => targetCodes.includes(ti.Station)));

            // 排序：依據輸入的第一個車站的 DEPTime 排序
            filtered.sort((a, b) => {
                const ta = a.TimeInfos.find(s => s.Station === targetCodes[0])?.DEPTime || "99:99";
                const tb = b.TimeInfos.find(s => s.Station === targetCodes[0])?.DEPTime || "99:99";
                return ta.localeCompare(tb);
            });

            renderTable(filtered, inputNames, targetCodes);
        }

        function renderTable(data, names, codes) {
            let h = `<table><thead><tr>
                <th>車次</th><th>車別</th><th>經由</th><th>起站</th><th>終站</th>`;
            names.forEach(n => h += `<th>${n}</th>`);
            h += `<th>備註</th></tr></thead><tbody>`;

            data.forEach(t => {
                const startStnCode = t.TimeInfos[0].Station;
                const endStnCode = t.TimeInfos[t.TimeInfos.length - 1].Station;
                
                h += `<tr>
                    <td class="train-info">${t.Train}</td>
                    <td>${CAR_CLASS_MAP[t.CarClass] || t.CarClass}</td>
                    <td>${LINE_MAP[t.Line] || ""}</td>
                    <td>${CODE_TO_NAME[startStnCode] || startStnCode}</td>
                    <td>${CODE_TO_NAME[endStnCode] || endStnCode}</td>`;

                codes.forEach(c => {
                    const stop = t.TimeInfos.find(si => si.Station === c);
                    h += `<td class="${stop ? 'time' : ''}">${stop ? stop.DEPTime.substring(0,5) : ""}</td>`;
                });

                h += `<td class="note">${t.Note || ""}</td></tr>`;
            });

            document.getElementById('output').innerHTML = h + "</tbody></table>";
        }
    </script>
</body>
</html>
