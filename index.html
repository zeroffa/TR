<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台鐵時刻表地理排序轉換器</title>
    <style>
        :root { --tra-blue: #003366; --tra-red: #d32f2f; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f4f7f9; padding: 20px; }
        .container { max-width: 100%; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: var(--tra-blue); text-align: center; border-bottom: 3px solid var(--tra-blue); padding-bottom: 10px; }
        .config-box { background: #eef2f7; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #d1d9e6; }
        .row { display: flex; gap: 15px; align-items: center; margin-bottom: 15px; flex-wrap: wrap; }
        input[type="text"], input[type="file"] { padding: 12px; border: 1px solid #ccc; border-radius: 8px; flex: 1; min-width: 300px; font-size: 16px; }
        button { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s; }
        .btn-run { background: var(--tra-blue); color: white; }
        .btn-sort { background: #546e7a; color: white; }
        
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; min-width: 1300px; }
        th { background: var(--tra-blue); color: white; padding: 12px 5px; border: 1px solid #ddd; white-space: nowrap; position: sticky; top: 0; }
        td { padding: 10px 5px; border: 1px solid #ddd; text-align: center; }
        tr:nth-child(even) { background: #fdfdfd; }
        tr:hover { background: #fff9c4; }
        .time-dep { color: var(--tra-red); font-weight: bold; font-family: 'Consolas', monospace; font-size: 1.1em; }
        .stn-header { background: #d9e2ec !important; color: var(--tra-blue) !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚂 台鐵全日縱向時刻表 (地理排序版)</h1>
        
        <div class="config-box">
            <div class="row">
                <strong>1. 載入 JSON：</strong>
                <input type="file" id="jsonFile" accept=".json">
            </div>
            <div class="row">
                <strong>2. 輸入車站：</strong>
                <input type="text" id="stnInput" value="高雄, 斗六, 二水, 田中, 彰化, 台中, 竹南, 桃園, 台北" placeholder="輸入站名，順序亂掉沒關係">
                <button class="btn-sort" onclick="sortInputStations(false)">北 → 南 排序</button>
                <button class="btn-sort" onclick="sortInputStations(true)">南 → 北 排序</button>
                <button class="btn-run" onclick="convert()">執行轉換</button>
            </div>
        </div>

        <div id="output" class="table-container"></div>
    </div>

    <script>
        // 依照地理位置排序的代碼表 (由北往南)
        const MASTER_STATIONS = [
            {n:"基隆",c:"0900"},{n:"七堵",c:"0930"},{n:"南港",c:"0980"},{n:"松山",c:"0990"},{n:"台北",c:"1000"},
            {n:"板橋",c:"1020"},{n:"樹林",c:"1030"},{n:"桃園",c:"1040"},{n:"中壢",c:"1060"},{n:"新竹",c:"1080"},
            {n:"竹南",c:"1250"},{n:"苗栗",c:"1300"},{n:"豐原",c:"3220"},{n:"台中",c:"3300"},{n:"彰化",c:"3360"},
            {n:"員林",c:"3390"},{n:"田中",c:"3430"},{n:"二水",c:"3450"},{n:"斗六",c:"3470"},{n:"嘉義",c:"4080"},
            {n:"新營",c:"4220"},{n:"台南",c:"4400"},{n:"岡山",c:"4600"},{n:"新左營",c:"4610"},{n:"高雄",c:"4400"},
            {n:"屏東",c:"5000"},{n:"潮州",c:"5050"},{n:"枋寮",c:"5120"}
        ];

        const STN_MAP = Object.fromEntries(MASTER_STATIONS.map(s => [s.n, s.c]));
        const CODE_TO_NAME = Object.fromEntries(MASTER_STATIONS.map(s => [s.c, s.n]));
        const CAR_MAP = { "110G":"自強(3000)","1101":"太魯閣","1102":"普悠瑪","1131":"區間車","1132":"區間快","1110":"莒光號","1103":"自強號" };
        const LINE_MAP = { "0": "", "1": "山", "2": "海", "3": "成追" };

        let db = null;

        document.getElementById('jsonFile').onchange = e => {
            const r = new FileReader();
            r.onload = ev => { db = JSON.parse(ev.target.result); alert("✅ JSON 已載入"); };
            r.readAsText(e.target.files[0]);
        };

        // 自動排序輸入的車站
        function sortInputStations(isReverse) {
            const input = document.getElementById('stnInput');
            let names = input.value.split(',').map(s => s.trim().replace('車站','')).filter(s => s);
            
            // 依照 MASTER_STATIONS 的索引排序
            names.sort((a, b) => {
                let idxA = MASTER_STATIONS.findIndex(s => s.n === a);
                let idxB = MASTER_STATIONS.findIndex(s => s.n === b);
                return isReverse ? idxB - idxA : idxA - idxB;
            });
            input.value = names.join(', ');
        }

        function convert() {
            if (!db) return alert("請先載入 JSON！");
            const names = document.getElementById('stnInput').value.split(',').map(s => s.trim()).filter(s => s);
            const codes = names.map(n => STN_MAP[n] || n);

            const trains = db.TrainInfos || [];
            let list = trains.filter(t => t.TimeInfos.some(ti => codes.includes(ti.Station)));

            // 依照表格最左邊第一個車站的發車時間進行 0-24 排序
            list.sort((a, b) => {
                const ta = a.TimeInfos.find(s => s.Station === codes[0])?.DEPTime || "99:99";
                const tb = b.TimeInfos.find(s => s.Station === codes[0])?.DEPTime || "99:99";
                return ta.localeCompare(tb);
            });

            let h = `<table><thead><tr><th>車次</th><th>車別</th><th>經由</th><th>起站</th><th>終站</th>`;
            names.forEach(n => h += `<th class="stn-header">${n}</th>`);
            h += `<th>備註</th></tr></thead><tbody>`;

            list.forEach(t => {
                const startCode = t.TimeInfos[0].Station;
                const endCode = t.TimeInfos[t.TimeInfos.length - 1].Station;
