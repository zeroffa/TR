<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台鐵時刻表專業轉換器 V2.0</title>
    <style>
        :root { --tra-blue: #003366; --tra-red: #d32f2f; --bg: #f5f7fa; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); padding: 20px; color: #333; }
        .container { max-width: 100%; margin: auto; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: var(--tra-blue); text-align: center; border-bottom: 3px solid var(--tra-blue); padding-bottom: 15px; margin-top: 0; }
        
        /* 區塊樣式 */
        .panel { background: #eef2f7; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #d1d9e6; }
        .row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
        .label { font-weight: bold; color: var(--tra-blue); min-width: 90px; }
        
        /* 輸入與按鈕 */
        input[type="text"], input[type="file"] { padding: 12px; border: 1px solid #ccc; border-radius: 8px; flex: 1; font-size: 15px; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--tra-blue); outline: none; box-shadow: 0 0 5px rgba(0,51,102,0.2); }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-run { background: var(--tra-blue); color: white; }
        .btn-sort { background: #546e7a; color: white; }
        button:hover { opacity: 0.85; transform: translateY(-1px); }
        button:active { transform: translateY(0); }

        /* 表格優化 */
        .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 1400px; }
        th { background: var(--tra-blue); color: #fff; padding: 12px 8px; border: 1px solid #ddd; white-space: nowrap; position: sticky; top: 0; }
        td { padding: 10px 8px; border: 1px solid #ddd; text-align: center; }
        tr:nth-child(even) { background: #fafafa; }
        tr:hover { background: #fff9c4; }
        
        /* 文字醒目 */
        .time-dep { color: var(--tra-red); font-weight: bold; font-family: "Consolas", monospace; font-size: 1.15em; }
        .train-no { font-weight: bold; color: #1a1a1a; }
        .stn-header { background: #d9e2ec !important; color: var(--tra-blue) !important; font-weight: 800; }
        .note { text-align: left; font-size: 12px; color: #777; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
        .status-bar { font-size: 13px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚂 台鐵全日時刻表專業轉換器</h1>

    <div class="panel">
        <div class="row">
            <span class="label">1. 時刻表：</span>
            <input type="file" id="jsonFile" accept=".json">
        </div>
        <div id="status" class="status-bar">💡 請先選擇台鐵 JSON 檔案</div>
        <div class="row">
            <span class="label">2. 車站列表：</span>
            <input type="text" id="stnInput" value="高雄, 斗六, 二水, 田中, 彰化, 台中, 竹南, 桃園, 台北" placeholder="請用逗號隔開站名">
        </div>
        <div class="row" style="justify-content: flex-end;">
            <button class="btn-sort" onclick="sortStations(false)">🔼 北往南排序</button>
            <button class="btn-sort" onclick="sortStations(true)">🔽 南往北排序</button>
            <button class="btn-run" onclick="convert()">⚡ 執行轉換</button>
        </div>
    </div>

    <div id="output" class="table-wrap"></div>
</div>

<script>
    // 基礎地理順序與代碼 (基於 Tip111)
    const MASTER_ORDER = ["基隆","七堵","汐止","南港","松山","台北","萬華","板橋","樹林","鶯歌","桃園","內壢","中壢","埔心","楊梅","富岡","湖口","新豐","竹北","新竹","竹南","苗栗","銅鑼","三義","后里","豐原","潭子","台中","新烏日","成功","彰化","花壇","大村","員林","永靖","社頭","田中","二水","林內","石榴","斗六","斗南","嘉義","新營","台南","岡山","新左營","高雄","鳳山","屏東","潮州"];
    
    const STN_DB = {
        "基隆":"0900","七堵":"0930","汐止":"0960","南港":"0980","松山":"0990","台北":"1000","萬華":"1010","板橋":"1020","樹林":"1030","鶯歌":"1050","桃園":"1040","內壢":"1070","中壢":"1060","埔心":"1100","楊梅":"1110","富岡":"1120","湖口":"1140","新豐":"1150","竹北":"1160","新竹":"1080","竹南":"1250","苗栗":"1300","銅鑼":"1310","三義":"1320","后里":"1330","豐原":"3220","潭子":"3230","台中":"3300","新烏日":"3340","成功":"3350","彰化":"3360","花壇":"3370","大村":"3380","員林":"3390","永靖":"3410","社頭":"3420","田中":"3430","二水":"3450","林內":"3460","石榴":"3465","斗六":"3470","斗南":"3480","嘉義":"4080","新營":"4220","台南":"4400","岡山":"4600","新左營":"4610","高雄":"4400","鳳山":"4410","屏東":"5000","潮州":"5050"
    };

    const CODE_TO_NAME = Object.fromEntries(Object.entries(STN_DB).map(([k, v]) => [v, k]));
    const CAR_MAP = { "110G":"自強(3000)","1101":"太魯閣","1102":"普悠瑪","1131":"區間車","1132":"區間快","1110":"莒光號","1103":"自強號" };
    const LINE_MAP = { "0": "", "1": "山", "2": "海", "3": "成追" };

    let trainData = null;

    // 檔案讀取最佳化
    document.getElementById('jsonFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                trainData = JSON.parse(ev.target.result);
                document.getElementById('status').innerText = `✅ 成功讀取：${file.name}`;
                document.getElementById('status').style.color = "#2e7d32";
            } catch (err) {
                alert("JSON 檔案格式損毀或錯誤，請確認檔案來源。");
                document.getElementById('status').innerText = "❌ 檔案格式錯誤";
                document.getElementById('status').style.color = "#d32f2f";
            }
        };
        reader.readAsText(file);
    });

    // 車站排序邏輯
    function sortStations(isReverse) {
        const input = document.getElementById('stnInput');
        let names = input.value.split(',').map(s => s.trim().replace(/車站$/, '')).filter(s => s);
        names.sort((a, b) => {
            let idxA = MASTER_ORDER.indexOf(a);
            let idxB = MASTER_ORDER.indexOf(b);
            if (idxA === -1) idxA = 999;
            if (idxB === -1) idxB = 999;
            return isReverse ? idxB - idxA : idxA - idxB;
        });
        input.value = names.join(', ');
    }

    // 主轉換功能
    function convert() {
        if (!trainData) return alert("請先載入 JSON 檔案！");
        
        const inputNames = document.getElementById('stnInput').value.split(',').map(s => s.trim().replace(/車站$/, '')).filter(s => s);
        const targetCodes = inputNames.map(n => STN_DB[n] || n);

        const trains = trainData.TrainInfos || [];
        // 過濾有停靠的車次
        let filtered = trains.filter(t => t.TimeInfos.some(ti => targetCodes.includes(ti.Station)));

        // 0-24 排序：依據最左側第一個有效車站時間
        filtered.sort((a, b) => {
            const timeA = a.TimeInfos.find(s => s.Station === targetCodes[0])?.DEPTime || "99:99";
            const timeB = b.TimeInfos.find(s => s.Station === targetCodes[0])?.DEPTime || "99:99";
            return timeA.localeCompare(timeB);
        });

        if (filtered.length === 0) return alert("查無停靠資料，請確認站名是否正確。");

        // 繪製表格
        let html = `<table><thead><tr>
            <th>車次</th><th>車別</th><th>經由</th><th>起站</th><th>終站</th>`;
        inputNames.forEach(n => html += `<th class="stn-header">${n}</th>`);
        html += `<th>備註</th></tr></thead><tbody>`;

        filtered.forEach(t => {
            const sCode = t.TimeInfos[0].Station;
            const eCode = t.TimeInfos[t.TimeInfos.length - 1].Station;
            
            html += `<tr>
                <td class="train-no">${t.Train}</td>
                <td>${CAR_MAP[t.CarClass] || t.CarClass}</td>
                <td>${LINE_MAP[t.Line] || ""}</td>
                <td>${CODE_TO_NAME[sCode] || sCode}</td>
                <td>${CODE_TO_NAME[eCode] || eCode}</td>`;
            
            targetCodes.forEach(c => {
                const stop = t.TimeInfos.find(si => si.Station === c);
                html += `<td>${stop ? `<span class="time-dep">${stop.DEPTime.slice(0,5)}</span>` : ""}</td>`;
            });

            html += `<td class="note">${t.Note || ""}</td></tr>`;
        });

        document.getElementById('output').innerHTML = html + "</tbody></table>";
    }
</script>

</body>
</html>
