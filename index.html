<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台鐵全日縱向時刻表產生器</title>
    <style>
        :root { --tra-blue: #003366; --tra-red: #d32f2f; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f0f4f8; padding: 20px; }
        .container { max-width: 100%; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        h1 { color: var(--tra-blue); text-align: center; border-bottom: 3px solid var(--tra-blue); padding-bottom: 10px; }
        .config-box { background: #eef2f7; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #d1d9e6; }
        .row { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; flex-wrap: wrap; }
        strong { color: var(--tra-blue); min-width: 120px; }
        input[type="text"], input[type="file"] { padding: 12px; border: 1px solid #ccc; border-radius: 8px; flex: 1; font-size: 16px; }
        button { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-main { background: var(--tra-blue); color: white; }
        .btn-reverse { background: #607d8b; color: white; }
        button:hover { opacity: 0.8; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .table-container { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 1500px; }
        th { background: var(--tra-blue); color: white; padding: 12px 5px; border: 1px solid #ddd; white-space: nowrap; position: sticky; top: 0; }
        td { padding: 10px 5px; border: 1px solid #ddd; text-align: center; }
        tr:nth-child(even) { background: #f9f9f9; }
        tr:hover { background: #fff9c4; }
        .time-dep { color: var(--tra-red); font-weight: bold; font-family: 'Consolas', monospace; font-size: 1.1em; }
        .stn-header { background: #d9e2ec !important; color: var(--tra-blue) !important; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚂 台鐵全日縱向時刻表轉換器</h1>
        <div class="config-box">
            <div class="row">
                <strong>1. 載入 JSON</strong>
                <input type="file" id="jsonFile" accept=".json">
            </div>
            <div class="row">
                <strong>2. 車站順序</strong>
                <input type="text" id="stnInput" value="台北, 桃園, 台中, 彰化, 田中, 二水, 斗六, 高雄" placeholder="請輸入中文站名，用逗號隔開">
                <button class="btn-reverse" onclick="reverseStations()">🔄 反向排序站點</button>
                <button class="btn-main" onclick="process()">執行轉換</button>
            </div>
            <div style="font-size: 13px; color: #555;">※ 支援中文搜尋，排序將以左側第一站的 DEPTime (00-24H) 為準。</div>
        </div>
        <div id="output" class="table-container"></div>
    </div>
