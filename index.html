<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台鐵時刻表自定義轉換器 - 完整格式版</title>
    <style>
        :root { --tra-blue: #003366; --tra-red: #d32f2f; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f4f7f9; padding: 20px; }
        .container { max-width: 100%; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: var(--tra-blue); text-align: center; border-bottom: 3px solid var(--tra-blue); padding-bottom: 10px; }
        .config-box { background: #eef2f7; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #d1d9e6; }
        .row { display: flex; gap: 15px; align-items: center; margin-bottom: 15px; flex-wrap: wrap; }
        input[type="text"], input[type="file"] { padding: 12px; border: 1px solid #ccc; border-radius: 8px; flex: 1; min-width: 300px; font-size: 16px; }
        button { padding: 12px 35px; background: var(--tra-blue); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; min-width: 1300px; }
        th { background: var(--tra-blue); color: white; padding: 12px 5px; border: 1px solid #ddd; white-space: nowrap; position: sticky; top: 0; }
        td { padding: 10px 5px; border: 1px solid #ddd; text-align: center; }
        tr:nth-child(even) { background: #fdfdfd; }
        tr:hover { background: #fff9c4; }
        
        .time-dep { color: var(--tra-red); font-weight: bold; font-family: 'Consolas', monospace; font-size: 1.1em; }
        .stn-header { background: #d9e2ec !important; color: var(--tra-blue) !important; font-weight: bold; }
        .note-cell { text-align: left; font-size: 11px; color: #666; max-width: 150px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚂 台鐵全日縱向時刻表轉換器</h1>
        
        <div class="config-box">
            <div class="row">
                <strong>1. 載入 JSON：</strong>
                <input type="file" id="jsonFile" accept=".json">
            </div>
            <div class="row">
                <strong>2. 車站中文 (依序)：</strong>
                <input type="text" id="stnInput" value="高雄, 斗六, 二水, 田中, 彰化, 台中, 竹南, 桃園, 台北" placeholder="請用逗號隔開站名">
                <button onclick="convert()">執行轉換</button>
            </div>
            <div style="font-size: 13px; color: #555;">※ 系統將自動對照站名與代碼。排序將以「最左側車站」的發車時間為基準進行 00-24 排序。</div>
        </div>

        <div id="output" class="table-container"></div>
    </div>

    <script>
        // 站名代碼對照 (涵蓋主要車站，可依需求自行增補)
        const STN_MAP = {
            "基隆":"0900","七堵":"0930","南港":"0980","松山":"0990","台北":"1000","板橋":"1020","樹林":"1030","桃園":"1040","中壢":"1060","新竹":"1080","竹南":"1250","苗栗":"1300","豐原":"3220","台中":"3300","彰化":"3360","員林":"3390","田中":"3430","二水":"3450","斗六":"3470","嘉義":"4080","新營":"4220","台南":"4400","岡山":"4600","新左營":"4610","高雄":"4400","屏東":"5000","潮州":"5050","宜蘭":"7000","羅東":"7100","花蓮":"6000","台東":"5100"
        };
        const CODE_TO_NAME = Object.fromEntries(Object.entries(STN_MAP).map(([k, v]) => [v, k]));
        const CAR_MAP = { "110G":"自強(3000)","110H":"自強(3000)","1101":"太魯閣","1102":"普悠瑪","1131":"區間車","1132":"區間快","1110":"莒光號","1103":"自強號" };
        const LINE_MAP = { "0": "", "1": "山", "2": "海", "3": "成追" };

        let db = null;

        document.getElementById('jsonFile').onchange = e => {
            const r = new FileReader();
            r.onload = ev => { db = JSON.parse(ev.target.result); alert("✅ JSON 載入成功"); };
            r.readAsText(e.target.files[0]);
        };

        function convert() {
            if (!db) return alert("請先載入 JSON 檔案！");
            const names = document.getElementById('stnInput').value.split(',').map(s => s.trim().replace('車站','')).filter(s => s);
            const codes = names.map(n => STN_MAP[n] || n);

            const trains = db.TrainInfos || [];
            
            // 過濾出有停靠這些站點中任一個的車次
            let list = trains.filter(t => t.TimeInfos.some(ti => codes.includes(ti.Station)));

            // 依照使用者輸入的第一個車站(最左邊)的 DEPTime 進行 00-24 排序
            list.sort((a, b) => {
                const ta = a.TimeInfos.find(s => s.Station === codes[0])?.DEPTime || "99:99";
                const tb = b.TimeInfos
