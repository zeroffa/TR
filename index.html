<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台鐵自定義時刻表產生器</title>
    <style>
        :root { --tra-blue: #003366; --tra-red: #d32f2f; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: var(--tra-blue); text-align: center; border-bottom: 3px solid var(--tra-blue); padding-bottom: 10px; }
        .upload-zone { background: #eef2f7; border: 2px dashed #003366; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        .query-zone { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; }
        input[type="text"] { padding: 12px; border: 2px solid #ddd; border-radius: 8px; width: 200px; font-size: 16px; }
        button { padding: 12px 25px; background: var(--tra-blue); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: var(--tra-blue); color: white; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f9f9f9; }
        .time { font-family: 'Courier New', Courier, monospace; color: var(--tra-red); font-weight: bold; font-size: 1.2em; }
        .tag { display: inline-block; padding: 3px 8px; border-radius: 5px; font-size: 12px; margin-right: 5px; color: white; font-weight: bold; }
        .tag-b { background: #e91e63; } .tag-w { background: #2196f3; }
        .tag-bk { background: #4caf50; } .tag-f { background: #ff9800; }
        .train-no { font-weight: bold; color: #333; }
        #status { text-align: center; color: #666; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>台鐵時刻表產生器</h1>
        
        <div class="upload-zone">
            <p><strong>第一步：載入資料</strong></p>
            <input type="file" id="fileInput" accept=".json">
            <div id="status">未載入資料 (請上傳 20260621.json 或其他時刻表)</div>
        </div>

        <div class="query-zone">
            <input type="text" id="stnCode" placeholder="輸入車站代碼 (如: 1000)">
            <button onclick="runQuery()">產生客製時刻表</button>
        </div>

        <div id="tableOut"></div>
    </div>

    <script>
        let jsonData = null;
        const carMap = {"110G":"自強(3000)","1101":"太魯閣","1131":"區間車","1132":"區間快","1110":"莒光"};

        // 讀取檔案
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    jsonData = JSON.parse(event.target.result);
                    document.getElementById('status').innerHTML = `✅ 已成功載入：${file.name}`;
                    document.getElementById('status').style.color = "green";
                } catch(err) {
                    alert("JSON 格式有誤");
                }
            };
            reader.readAsText(file);
        });

        function runQuery() {
            if (!jsonData) return alert("請先上傳 JSON 檔案！");
            const code = document.getElementById('stnCode').value.trim();
            if (!code) return alert("請輸入車站代碼");

            const trains = jsonData.TrainInfos || [];
            const results = [];

            trains.forEach(t => {
                const stop = t.TimeInfos.find(s => s.Station === code);
                if (stop) {
                    results.push({
                        no: t.Train,
                        type: carMap[t.CarClass] || t.CarClass,
                        arr: stop.ARRTime,
                        info: (t.LineDir === "1" ? "順" : "逆") + (t.Line === "1" ? "(山)" : t.Line === "2" ? "(海)" : ""),
                        svc: { b: t.BreastFeed==="Y", w: t.Cripple==="Y", bk: t.Bike==="Y", f: t.FoodSrv==="Y" },
                        note: t.Note || ""
                    });
                }
            });

            results.sort((a, b) => a.arr.localeCompare(b.arr));
            render(results, code);
        }

        function render(data, code) {
            const out = document.getElementById('tableOut');
            if (data.length === 0) {
                out.innerHTML = `<p style="text-align:center; color:red;">找不到代碼 ${code} 的資料</p>`;
                return;
            }

            let h = `<table><thead><tr><th>時間</th><th>車次</th><th>車種</th><th>服務</th><th>備註</th></tr></thead><tbody>`;
            data.forEach(d => {
                let tags = (d.svc.b?'<span class="tag tag-b">哺</span>':'') +
                           (d.svc.w?'<span class="tag tag-w">輪</span>':'') +
                           (d.svc.bk?'<span class="tag tag-bk">腳</span>':'') +
                           (d.svc.f?'<span class="tag tag-f">訂</span>':'');
                h += `<tr>
                    <td class="time">${d.arr.substring(0,5)}</td>
                    <td class="train-no">${d.no}</td>
                    <td>${d.type}<br><small>${d.info}</small></td>
                    <td>${tags}</td>
                    <td style="font-size:12px; color:#666;">${d.note}</td>
                </tr>`;
            });
            out.innerHTML = h + `</tbody></table>`;
        }
    </script>
</body>
</html>
